<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>PrimeHermes Dashboard — Command Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#050508;--bg2:#0a0a12;--surface:#0f0f1e;--surface-hov:#16162a;--border:rgba(40,40,80,.4);--border-light:rgba(30,30,60,.25);--fg:#e8e8f0;--fg2:#8888a8;--fg3:#555570;--fg4:#3a3a50;--accent:#6c5ce7;--accent-hov:#7c6cf7;--accent-glow:rgba(108,92,231,.15);--green:#22c55e;--green-bg:rgba(34,197,94,.08);--yellow:#f5a50b;--yellow-bg:rgba(245,165,11,.08);--red:#ef4444;--red-bg:rgba(239,68,68,.08);--shadow:0 4px 24px rgba(0,0,0,.5);--rad:10px;--rad-sm:6px}
html{height:100%}
body{min-height:100vh;background:var(--bg);color:var(--fg);font-family:'Inter',sans-serif;font-size:13px;line-height:1.5;display:flex;overflow:hidden}
a{color:inherit;text-decoration:none}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--fg4);border-radius:2px}::-webkit-scrollbar-track{background:transparent}
::selection{background:var(--accent);color:#fff}

/* ─── SIDEBAR ─── */
.sb{width:230px;min-height:100vh;position:fixed;left:0;top:0;background:var(--bg2);border-right:1px solid var(--border-light);display:flex;flex-direction:column;z-index:100;transition:transform .3s cubic-bezier(.34,1.56,.64,1)}
.sb-brand{display:flex;align-items:center;gap:10px;padding:20px 18px 16px;border-bottom:1px solid var(--border-light)}
.sb-brand-icon{width:30px;height:30px;background:linear-gradient(135deg,var(--accent),#a29bfe);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#fff;box-shadow:0 0 20px var(--accent-glow)}
.sb-brand-text{font-size:13px;font-weight:700;letter-spacing:-.2px}
.sb-brand-sub{font-size:8px;font-weight:600;color:var(--fg4);letter-spacing:1.5px;text-transform:uppercase}
.sb-nav{flex:1;overflow-y:auto;padding:10px 8px;display:flex;flex-direction:column;gap:1px}
.sb-label{font-size:9px;font-weight:700;color:var(--fg4);letter-spacing:1.5px;text-transform:uppercase;padding:14px 12px 6px}
.sb-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--rad-sm);font-size:12px;font-weight:500;color:var(--fg2);transition:all .2s;cursor:pointer;border:none;background:none;width:100%;text-align:left;font-family:'Inter',sans-serif}
.sb-item:hover{background:var(--surface);color:var(--fg)}
.sb-item.active{background:var(--accent-glow);color:var(--accent);font-weight:600}
.sb-item-icon{width:18px;text-align:center;font-size:14px;flex-shrink:0}
.sb-badge{margin-left:auto;font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;background:var(--border-light);color:var(--fg4)}
.sb-badge.green{background:var(--green-bg);color:var(--green)}
.sb-footer{padding:14px 16px;border-top:1px solid var(--border-light);font-size:9px;color:var(--fg4);text-align:center}

/* ─── MAIN ─── */
.main{flex:1;overflow-y:auto;padding:0 28px 50px;max-width:1400px;margin-left:230px;height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 0 10px;border-bottom:1px solid var(--border-light);position:sticky;top:0;background:var(--bg);z-index:10}
.topbar-left h1{font-size:18px;font-weight:700;letter-spacing:-.3px}
.topbar-left p{font-size:11px;color:var(--fg3);margin-top:1px}
.topbar-right{display:flex;align-items:center;gap:10px}
.status-pill{font-size:10px;font-weight:600;padding:4px 12px;border-radius:20px;background:var(--green-bg);color:var(--green);display:flex;align-items:center;gap:5px}
.status-dot{width:6px;height:6px;border-radius:50%;display:inline-block;background:var(--green);box-shadow:0 0 8px rgba(34,197,94,.4)}

/* ─── TABS ─── */
.tab{display:none;animation:fadeIn .25s ease}
.tab.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ─── OVERVIEW TAB ─── */
.stats{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin:18px 0 22px}
.stat{background:var(--surface);border:1px solid var(--border-light);border-radius:var(--rad);padding:14px 16px}
.stat-icon{font-size:18px;margin-bottom:4px}
.stat-val{font-size:20px;font-weight:800;letter-spacing:-.3px}
.stat-label{font-size:10px;color:var(--fg3);margin-top:3px}
.stat-sub{font-size:9px;color:var(--fg4);margin-top:2px}

/* ─── SITES ─── */
.sites-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.site-card{background:var(--surface);border:1px solid var(--border-light);border-radius:var(--rad);padding:14px 16px}
.site-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.site-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.site-dot.online{background:var(--green);box-shadow:0 0 10px rgba(34,197,94,.3)}
.site-dot.offline{background:var(--red);box-shadow:0 0 10px rgba(239,68,68,.3)}
.site-name{font-size:12px;font-weight:600;flex:1}
.site-url{font-size:9px;color:var(--fg4);margin-bottom:6px}
.site-meta{display:flex;gap:14px;font-size:10px;color:var(--fg3)}
.score{font-size:9px;font-weight:700;padding:2px 8px;border-radius:4px}
.score-good{background:var(--green-bg);color:var(--green)}
.score-mid{background:var(--yellow-bg);color:var(--yellow)}
.score-bad{background:var(--red-bg);color:var(--red)}

/* ─── PROJECTS ─── */
.biz-list{display:flex;flex-direction:column;gap:8px}
.biz-item{background:var(--surface);border:1px solid var(--border-light);border-radius:var(--rad);padding:12px 14px}
.biz-head{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.biz-emoji{font-size:16px}
.biz-name{font-size:12px;font-weight:600;flex:1}
.biz-tag{font-size:8px;font-weight:700;padding:2px 8px;border-radius:4px;background:var(--accent-glow);color:var(--accent);text-transform:uppercase;letter-spacing:.5px}
.biz-desc{font-size:10px;color:var(--fg2);margin-bottom:8px;line-height:1.5}
.biz-mets{display:flex;flex-wrap:wrap;gap:4px 12px;margin-bottom:6px}
.biz-met{font-size:9px;color:var(--fg4)}
.biz-met strong{color:var(--fg);font-weight:600}
.biz-acts{display:flex;gap:6px;flex-wrap:wrap}
.biz-act{font-size:9px;padding:3px 8px;border-radius:4px;background:var(--border-light);color:var(--fg3)}
.biz-note{font-size:9px;color:var(--fg4);margin-top:6px;padding-top:6px;border-top:1px solid var(--border-light);font-style:italic}

/* ─── AGENTS ─── */
.agents-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.agent-card{background:var(--surface);border:1px solid var(--border-light);border-radius:var(--rad);padding:12px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:4px}
.agent-icon{font-size:22px}
.agent-name{font-size:10px;font-weight:600}
.agent-meta{font-size:8px;color:var(--fg4)}
.agent-badge{font-size:8px;font-weight:700;padding:2px 8px;border-radius:4px;background:var(--green-bg);color:var(--green)}

/* ─── LEADS TABLE ─── */
.leads-wrap{background:var(--surface);border:1px solid var(--border-light);border-radius:var(--rad);overflow:hidden}
.leads-table{width:100%;border-collapse:collapse}
.leads-table th{padding:8px 12px;text-align:left;font-size:8px;font-weight:700;color:var(--fg4);text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--border-light)}
.leads-table td{padding:7px 12px;font-size:11px;border-bottom:1px solid var(--border-light)}
.leads-table tr:last-child td{border-bottom:none}
.lead-contact{font-size:8px;color:var(--green)}

/* ─── LOG ─── */
.log-wrap{background:var(--surface);border:1px solid var(--border-light);border-radius:var(--rad);padding:4px 12px}
.log-item{display:flex;gap:10px;padding:7px 0;border-bottom:1px solid var(--border-light);font-size:10px}
.log-item:last-child{border-bottom:none}
.log-date{color:var(--fg4);flex-shrink:0;width:80px;font-size:9px}
.log-msg{color:var(--fg2)}

/* ─── SECTION HEADERS ─── */
.sec-title{font-size:10px;font-weight:700;color:var(--fg3);letter-spacing:1px;text-transform:uppercase;margin:22px 0 10px;display:flex;align-items:center;gap:8px}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border-light)}

/* ─── QA ─── */
.qa-card{background:var(--surface);border:1px solid var(--border-light);border-radius:var(--rad);padding:14px 16px}
.qa-summary{font-size:12px;color:var(--fg2);margin-bottom:10px}
.qa-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border-light);font-size:11px}
.qa-row:last-child{border-bottom:none}
.qa-site{font-weight:600}
.qa-time{font-size:9px;color:var(--fg4);margin-left:auto}

/* ─── EMPTY STATE ─── */
.empty{text-align:center;padding:24px;color:var(--fg3);font-size:12px}

/* ─── MOBILE ─── */
.hamburger{display:none;width:32px;height:32px;align-items:center;justify-content:center;background:none;border:1px solid var(--border-light);border-radius:6px;cursor:pointer;color:var(--fg2);font-size:16px;flex-shrink:0}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:99;opacity:0;transition:opacity .3s}
.overlay.show{opacity:1}

@media(max-width:820px){
  body{flex-direction:column}
  .hamburger{display:flex}
  .sb{transform:translateX(-100%)}
  .sb.open{transform:translateX(0)}
  .overlay{display:block;pointer-events:none}
  .overlay.show{pointer-events:all}
  .main{margin-left:0;padding:0 14px 40px;height:auto;min-height:100vh}
  .topbar{padding:12px 0 8px;gap:8px}
  .topbar-left h1{font-size:15px}
  .status-pill{font-size:9px;padding:3px 10px}
  .stats{grid-template-columns:repeat(3,1fr);gap:8px;margin:14px 0 16px}
  .stat{padding:10px 12px}
  .stat-val{font-size:16px}
  .sites-grid{grid-template-columns:1fr}
  .agents-grid{grid-template-columns:repeat(3,1fr)}
  .sec-title{margin:16px 0 8px}
}
@media(max-width:480px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .agents-grid{grid-template-columns:repeat(2,1fr)}
  .sb{width:100%}
}
</style>
</head>
<body>

<div class="overlay" id="overlay"></div>

<!-- ─── SIDEBAR ─── -->
<aside class="sb" id="sidebar">
  <div class="sb-brand">
    <div class="sb-brand-icon">P</div>
    <div><div class="sb-brand-text">PrimeHermes</div><div class="sb-brand-sub">Command Center</div></div>
  </div>
  <nav class="sb-nav">
    <div class="sb-label">Overview</div>
    <button class="sb-item active" data-tab="overview"><span class="sb-item-icon">📊</span> Dashboard</button>
    <button class="sb-item" data-tab="sites"><span class="sb-item-icon">🌐</span> Sites</button>
    <button class="sb-item" data-tab="projects"><span class="sb-item-icon">🏗️</span> Projects</button>
    <button class="sb-item" data-tab="agents"><span class="sb-item-icon">🤖</span> Agents</button>
    <div class="sb-label">Quality</div>
    <button class="sb-item" data-tab="qa"><span class="sb-item-icon">✅</span> QA Scan</button>
    <div class="sb-label">Data</div>
    <button class="sb-item" data-tab="leads"><span class="sb-item-icon">🎯</span> Leads</button>
    <button class="sb-item" data-tab="log"><span class="sb-item-icon">📋</span> Activity</button>
  </nav>
  <div class="sb-footer">Tradie SitePilot &copy; 2026</div>
</aside>

<!-- ─── MAIN ─── -->
<main class="main">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:10px">
      <button class="hamburger" id="hamburger">☰</button>
      <div class="topbar-left">
        <h1 id="tabTitle">Dashboard</h1>
        <p>Command center — <span id="updatedField">loading...</span></p>
      </div>
    </div>
    <div class="topbar-right">
      <span class="status-pill"><span class="status-dot"></span> Online</span>
    </div>
  </div>

  <!-- TAB: Overview -->
  <div class="tab active" id="tab-overview">
    <div class="stats" id="statsRow"></div>
    <div class="sec-title">🌐 Monitored Sites</div>
    <div class="sites-grid" id="sitesGrid"></div>
  </div>

  <!-- TAB: Sites (full) -->
  <div class="tab" id="tab-sites">
    <div class="sec-title">🌐 All Sites</div>
    <div class="sites-grid" id="sitesGridFull"></div>
    <div class="sec-title">📈 Trading</div>
    <div id="tradeSection"></div>
  </div>

  <!-- TAB: Projects -->
  <div class="tab" id="tab-projects">
    <div class="sec-title">🏗️ Business Projects</div>
    <div class="biz-list" id="bizList"></div>
  </div>

  <!-- TAB: Agents -->
  <div class="tab" id="tab-agents">
    <div class="sec-title">🤖 AI Agents</div>
    <div class="agents-grid" id="agentsGrid"></div>
  </div>

  <!-- TAB: QA -->
  <div class="tab" id="tab-qa">
    <div class="sec-title">✅ Daily QA Scan</div>
    <div class="qa-card" id="qaSection">
      <div class="qa-summary" id="qaSummary">Loading...</div>
      <div id="qaDetails"></div>
    </div>
  </div>

  <!-- TAB: Leads -->
  <div class="tab" id="tab-leads">
    <div class="sec-title">🎯 Recent Leads</div>
    <div class="leads-wrap"><table class="leads-table"><tbody id="leadsList"></tbody></table></div>
  </div>

  <!-- TAB: Activity -->
  <div class="tab" id="tab-log">
    <div class="sec-title">📋 Activity Log</div>
    <div class="log-wrap"><div class="log-list" id="logList"></div></div>
  </div>
</main>

<!-- DATA_INJECTION_POINT -->
<script>
var TAB_NAMES={overview:'Dashboard',sites:'Sites & Trading',projects:'Projects',agents:'AI Agents',qa:'QA Scan',leads:'Leads',log:'Activity'};

function fmtNum(n){if(n===undefined||n===null)return'—';if(Math.abs(n)>=1e6)return(n/1e6).toFixed(1)+'M';if(Math.abs(n)>=1e3)return(n/1e3).toFixed(1)+'k';return n.toLocaleString()}
function fmtDate(d){if(!d)return'';var p=d.split('T')[0].split('-');return p[2]+'/'+p[1]+'/'+p[0].slice(2)}

function init(){
  // Tab switching
  document.querySelectorAll('.sb-item[data-tab]').forEach(function(btn){
    btn.addEventListener('click',function(){
      var tab=this.getAttribute('data-tab');
      document.querySelectorAll('.sb-item').forEach(function(b){b.classList.remove('active')});
      this.classList.add('active');
      document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});
      var el=document.getElementById('tab-'+tab);
      if(el)el.classList.add('active');
      var title=document.getElementById('tabTitle');
      if(title&&TAB_NAMES[tab])title.textContent=TAB_NAMES[tab];
      // Close mobile sidebar
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('overlay').classList.remove('show');
    });
  });

  // Hamburger
  document.getElementById('hamburger').addEventListener('click',function(){
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('overlay').classList.toggle('show');
  });
  document.getElementById('overlay').addEventListener('click',function(){
    document.getElementById('sidebar').classList.remove('open');
    this.classList.remove('show');
  });

  var uf=document.getElementById('updatedField');
  if(typeof UPDATED!=='undefined'&&UPDATED)uf.textContent='Updated '+UPDATED;

  // Overview stats
  var totalLeads=typeof LEADS!=='undefined'?LEADS.length:0;
  var contacted=typeof LEADS!=='undefined'?LEADS.filter(function(l){return l.contacted}).length:0;
  var sitesTotal=typeof SITES_DATA!=='undefined'?SITES_DATA.length:0;
  var onlineCount=typeof SITES_DATA!=='undefined'?SITES_DATA.filter(function(s){return s.status==='online'}).length:0;
  var totalLogs=typeof LOG_DATA!=='undefined'?LOG_DATA.length:0;

  var statsRow=document.getElementById('statsRow');
  var statsList=[
    {icon:'🎯',val:totalLeads,label:'Total Leads',sub:contacted+' contacted'},
    {icon:'🌐',val:sitesTotal,label:'Monitored Sites',sub:onlineCount+' online'},
    {icon:'🤖',val:5,label:'AI Agents',sub:'Active'},
    {icon:'📋',val:totalLogs,label:'Activity Entries',sub:'Recent'},
    {icon:'✅',val:onlineCount+'/'+sitesTotal,label:'Sites Online',sub:'100% uptime'},
  ];
  statsList.forEach(function(s){
    statsRow.innerHTML+='<div class="stat"><div class="stat-icon">'+s.icon+'</div><div class="stat-val">'+s.val+'</div><div class="stat-label">'+s.label+'</div><div class="stat-sub">'+s.sub+'</div></div>';
  });

  // Site cards
  function renderSites(container){
    if(typeof SITES_DATA==='undefined')return;
    container.innerHTML='';
    SITES_DATA.forEach(function(s){
      var dotCls=s.status==='online'?'online':'offline';
      var sc='';if(s.score!==undefined&&s.score!==null){var c=s.score>=80?'score-good':s.score>=50?'score-mid':'score-bad';sc='<span class="score '+c+'">'+s.score+'/100</span>';}
      container.innerHTML+='<div class="site-card"><div class="site-top"><span class="site-dot '+dotCls+'"></span><span class="site-name">'+s.name+'</span>'+sc+'</div><div class="site-url">'+(s.url||'—')+'</div><div class="site-meta"><span>⏱<strong>'+s.uptime+'</strong></span>'+(s.seo&&s.seo.pages_analyzed?'<span>📄<strong>'+s.seo.pages_analyzed+'</strong> pages</span>':'')+'</div></div>';
    });
  }
  renderSites(document.getElementById('sitesGrid'));
  renderSites(document.getElementById('sitesGridFull'));

  // Trading
  var tradeSec=document.getElementById('tradeSection');
  try{
    if(window.TRADING_DATA&&TRADING_DATA.signals&&TRADING_DATA.signals.length>0){
      var html='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">';
      TRADING_DATA.signals.forEach(function(sig){
        var c=sig.action==='BUY'?'buy':'sell'; var l=sig.action==='BUY'?'🟢BUY':'🔴SELL';
        html+='<div style="background:var(--surface);border:1px solid var(--border-light);border-radius:var(--rad);padding:12px 14px"><div style="font-size:10px;font-weight:600;color:var(--fg3)">'+sig.pair+'/USD</div><div style="font-size:16px;font-weight:800;margin:4px 0">$'+fmtNum(sig.price)+'</div><span style="font-size:9px;font-weight:700;padding:2px 8px;border-radius:4px;background:var(--'+(sig.action==='BUY'?'green':'red')+'-bg);color:var(--'+(sig.action==='BUY'?'green':'red')+')">'+l+'</span></div>';
      });
      html+='</div>';
      tradeSec.innerHTML=html;
    }
  }catch(e){}

  // Business Projects (all on one tab)
  var bizList=document.getElementById('bizList');
  if(typeof BIZ_DATA!=='undefined'){
    BIZ_DATA.forEach(function(b){
      var mHtml='';
      if(b.metrics){Object.keys(b.metrics).forEach(function(k){mHtml+='<span class="biz-met"><strong>'+k.replace(/_/g,' ').toUpperCase()+':</strong> '+b.metrics[k]+'</span>';});}
      var acts='';
      if(b.next_steps&&b.next_steps.length){b.next_steps.slice(0,3).forEach(function(n){acts+='<span class="biz-act">'+n+'</span>';});}
      bizList.innerHTML+='<div class="biz-item"><div class="biz-head"><span class="biz-emoji">'+(b.emoji||'📌')+'</span><span class="biz-name">'+b.name+'</span><span class="biz-tag">'+b.status+'</span>'+(b.url?'<a href="'+b.url+'" target="_blank" style="font-size:10px;color:var(--fg4);margin-left:auto">🔗</a>':'')+'</div><div class="biz-desc">'+(b.description||'')+'</div><div class="biz-mets">'+mHtml+'</div>'+(acts?'<div class="biz-acts">'+acts+'</div>':'')+(b.notes?'<div class="biz-note">'+b.notes+'</div>':'')+'</div>';
    });
  }

  // Agents
  var agentsGrid=document.getElementById('agentsGrid');
  if(typeof AGENTS_DATA!=='undefined'){
    AGENTS_DATA.forEach(function(a){
      agentsGrid.innerHTML+='<div class="agent-card"><div class="agent-icon">'+a.icon+'</div><div class="agent-name">'+a.name+'</div><div class="agent-meta">'+a.jobs+' jobs</div><span class="agent-badge">Active</span></div>';
    });
  }

  // QA
  if(typeof QA_DATA!=='undefined'){
    var q=QA_DATA;
    document.getElementById('qaSummary').textContent=(q.status==='ok'?'✅ All Clean':'⚠️ Issues Found')+' — '+q.summary;
    var det='';
    Object.keys(q.sites).forEach(function(s){
      var site=q.sites[s];
      det+='<div class="qa-row"><span>'+(site.status==='ok'?'✅':'⚠️')+'</span><span class="qa-site">'+s+'</span><span style="color:var(--fg3);font-size:10px">'+Object.keys(site.checks||{}).filter(function(k){return site.checks[k]!=='ok'}).join(', ')+'</span><span class="qa-time">'+q.date+'</span></div>';
    });
    document.getElementById('qaDetails').innerHTML=det;
  }

  // Leads
  var leadsList=document.getElementById('leadsList');
  if(typeof LEADS!=='undefined'&&LEADS.length>0){
    LEADS.slice(0,20).forEach(function(l){
      leadsList.innerHTML+='<tr><td>'+(l.contacted?'✅':'🆕')+'</td><td>'+l.email+'</td><td style="font-size:10px;color:var(--fg4)">'+(l.company||'')+'</td><td style="font-size:9px;color:var(--fg4)">'+fmtDate(l.date)+'</td></tr>';
    });
  }else{
    leadsList.innerHTML='<tr><td colspan="4" class="empty">No leads yet</td></tr>';
  }

  // Log
  var logList=document.getElementById('logList');
  if(typeof LOG_DATA!=='undefined'){
    LOG_DATA.slice(0,15).forEach(function(l){
      logList.innerHTML+='<div class="log-item"><span class="log-date">'+fmtDate(l.date)+'</span><span class="log-msg">'+(l.message||l.text||l.description||'')+'</span></div>';
    });
  }
}
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
