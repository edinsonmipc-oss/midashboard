<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>PrimeHermes Dashboard — Command Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>

/* ═══════════════════════════════════════════
   PRIMEHERMES DASHBOARD v4.0 — Premium SaaS
   ═══════════════════════════════════════════ */

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#050508;--bg2:#08080f;--bg3:#0c0c18;
  --surface:#10101e;--surface-hov:#16162a;--surface-border:rgba(30,30,60,.5);
  --elevated:#1a1a2e;--elevated-border:rgba(40,40,80,.4);
  --fg:#e8e8f0;--fg2:#8888a8;--fg3:#555570;--fg4:#3a3a50;
  --accent:#6366f1;--accent-hov:#818cf8;--accent-glow:rgba(99,102,241,.12);
  --green:#22c55e;--green-bg:rgba(34,197,94,.08);--green-border:rgba(34,197,94,.15);
  --yellow:#f5a50b;--yellow-bg:rgba(245,165,11,.08);
  --red:#ef4444;--red-bg:rgba(239,68,68,.08);
  --orange:#f97316;--orange-bg:rgba(249,115,22,.08);
  --purple:#a855f7;--purple-bg:rgba(168,85,247,.08);
  --shadow:0 4px 24px rgba(0,0,0,.5);--shadow-lg:0 8px 48px rgba(0,0,0,.6);
  --ts:.2s cubic-bezier(.34,1.56,.64,1);--ts-out:.25s cubic-bezier(.4,0,.2,1);
  --rad-sm:6px;--rad:10px;--rad-lg:14px;--rad-xl:20px;
  --sidebar-w:220px;--top-h:56px;--fs-xs:10px;--fs-sm:12px;--fs-base:13px;--fs-lg:15px;
}

html{height:100%;scroll-behavior:smooth}
body{min-height:100vh;background:var(--bg);color:var(--fg);font-family:'Inter',-apple-system,sans-serif;
  font-size:var(--fs-base);line-height:1.5;display:flex;overflow-x:hidden}
a{color:inherit;text-decoration:none}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--fg4);border-radius:2px}
::selection{background:var(--accent);color:#fff}

/* ── Sidebar ── */
.sb{width:var(--sidebar-w);height:100vh;position:sticky;top:0;background:var(--bg2);border-right:1px solid var(--surface-border);
  display:flex;flex-direction:column;padding:0;overflow:hidden;flex-shrink:0;z-index:50}
.sb-brand{display:flex;align-items:center;gap:10px;padding:18px 18px 14px;border-bottom:1px solid var(--surface-border)}
.sb-brand-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),#818cf8);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#fff;box-shadow:0 0 20px var(--accent-glow)}
.sb-brand-text{font-size:14px;font-weight:700;color:var(--fg);letter-spacing:-0.2px}
.sb-brand-sub{font-size:9px;font-weight:600;color:var(--fg3);letter-spacing:1.2px;text-transform:uppercase}
.sb-nav{flex:1;overflow-y:auto;padding:12px 10px;display:flex;flex-direction:column;gap:2px}
.sb-section{font-size:9px;font-weight:700;color:var(--fg4);letter-spacing:1.5px;text-transform:uppercase;padding:14px 10px 6px}
.sb-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--rad-sm);font-size:13px;font-weight:500;color:var(--fg2);transition:all var(--ts-out);cursor:pointer}
.sb-item:hover{background:var(--surface);color:var(--fg)}.sb-item.active{background:var(--accent-glow);color:var(--accent);font-weight:600}
.sb-item-icon{width:20px;text-align:center;font-size:16px;flex-shrink:0}
.sb-badge{margin-left:auto;font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;background:var(--surface-border);color:var(--fg3)}
.sb-badge.green{background:var(--green-bg);color:var(--green)}.sb-badge.yellow{background:var(--yellow-bg);color:var(--yellow)}.sb-badge.red{background:var(--red-bg);color:var(--red)}
.sb-footer{padding:14px 16px;border-top:1px solid var(--surface-border);font-size:10px;color:var(--fg4);text-align:center}

/* ── Main Content ── */
.main{flex:1;overflow-y:auto;padding:0 32px 60px;max-width:1400px}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 0 10px;border-bottom:1px solid var(--surface-border);position:sticky;top:0;background:var(--bg);z-index:10}
.topbar-left h1{font-size:20px;font-weight:700;letter-spacing:-0.3px}
.topbar-left p{font-size:12px;color:var(--fg3);margin-top:2px}
.topbar-right{display:flex;align-items:center;gap:12px}
.topbar-update{font-size:11px;color:var(--fg4);display:flex;align-items:center;gap:6px}
.status-dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.status-dot.green{background:var(--green);box-shadow:0 0 8px rgba(34,197,94,.4)}.status-dot.yellow{background:var(--yellow);box-shadow:0 0 8px rgba(245,165,11,.4)}.status-dot.red{background:var(--red);box-shadow:0 0 8px rgba(239,68,68,.4)}

/* ── Summary Stats ── */
.stats{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin:24px 0 28px}
.stat{background:var(--surface);border:1px solid var(--surface-border);border-radius:var(--rad);padding:16px 18px;transition:all var(--ts-out)}
.stat:hover{background:var(--surface-hov);border-color:var(--elevated-border);transform:translateY(-1px)}
.stat-icon{font-size:20px;margin-bottom:6px}
.stat-val{font-size:22px;font-weight:800;letter-spacing:-0.3px;line-height:1.2}
.stat-label{font-size:11px;color:var(--fg3);margin-top:4px}
.stat-change{font-size:10px;font-weight:600;margin-top:3px}
.stat-change.up{color:var(--green)}.stat-change.down{color:var(--red)}

/* ── Grid sections ── */
.section-title{font-size:11px;font-weight:700;color:var(--fg3);letter-spacing:1.2px;text-transform:uppercase;margin:32px 0 14px;display:flex;align-items:center;gap:8px}
.section-title::after{content:'';flex:1;height:1px;background:var(--surface-border)}

.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}

/* ── Cards ── */
.card{background:var(--surface);border:1px solid var(--surface-border);border-radius:var(--rad);padding:18px 20px;transition:all var(--ts-out)}
.card:hover{background:var(--surface-hov);border-color:var(--elevated-border)}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.card-title{font-size:13px;font-weight:700}
.card-sub{font-size:10px;color:var(--fg4);text-transform:uppercase;letter-spacing:.8px}

/* ── Site Card ── */
.site-card{display:flex;flex-direction:column}
.site-card .top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.site-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.site-dot.online{background:var(--green);box-shadow:0 0 10px rgba(34,197,94,.3)}
.site-dot.offline{background:var(--red);box-shadow:0 0 10px rgba(239,68,68,.3)}
.site-name{font-size:13px;font-weight:700;flex:1}
.site-url{font-size:10px;color:var(--fg4)}
.site-stats{display:flex;gap:16px;margin-top:8px;font-size:11px;color:var(--fg3)}
.site-stats span{display:flex;align-items:center;gap:4px}
.site-stats strong{color:var(--fg)}

/* ── Trading ── */
.trade-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:8px}
.trade-asset{background:var(--bg3);border:1px solid var(--surface-border);border-radius:var(--rad-sm);padding:14px;text-align:center}
.trade-symbol{font-size:11px;font-weight:700;color:var(--fg3);text-transform:uppercase;letter-spacing:.5px}
.trade-price{font-size:20px;font-weight:800;margin:6px 0 2px}
.trade-change{font-size:11px;font-weight:600}
.trade-change.pos{color:var(--green)}.trade-change.neg{color:var(--red)}
.trade-signal{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-top:6px;padding:3px 8px;border-radius:3px;display:inline-block}
.trade-signal.buy{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.trade-signal.sell{background:var(--red-bg);color:var(--red);border:1px solid rgba(239,68,68,.15)}
.trade-signal.hold{background:var(--yellow-bg);color:var(--yellow);border:1px solid rgba(245,165,11,.15)}

/* ── Agent Cards ── */
.agent-card{display:flex;align-items:center;gap:12px;padding:14px 16px}
.agent-icon{font-size:22px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;background:var(--bg3);border-radius:8px}
.agent-info{flex:1}.agent-name{font-size:13px;font-weight:700}.agent-meta{font-size:11px;color:var(--fg3);margin-top:2px}
.agent-status{font-size:10px;font-weight:600;padding:3px 8px;border-radius:4px}
.agent-status.active{background:var(--green-bg);color:var(--green)}

/* ── Leads ── */
.lead-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--surface-border);font-size:12px}
.lead-item:last-child{border-bottom:none}
.lead-email{flex:1;color:var(--fg)}.lead-date{color:var(--fg3);font-size:10px}.lead-status{font-size:10px;font-weight:600}
.lead-status.new{color:var(--accent)}.lead-status.contacted{color:var(--green)}

/* ── Changelog ── */
.log-item{display:flex;gap:10px;padding:8px 10px;font-size:11px;border-bottom:1px solid var(--surface-border)}
.log-item:last-child{border-bottom:none}
.log-date{color:var(--fg4);font-size:10px;white-space:nowrap;min-width:70px;font-family:'JetBrains Mono',monospace}
.log-msg{color:var(--fg2);line-height:1.5}

/* ── SEO Score Badge ── */
.score-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:4px}
.score-good{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.score-medium{background:var(--yellow-bg);color:var(--yellow);border:1px solid rgba(245,165,11,.15)}
.score-bad{background:var(--red-bg);color:var(--red);border:1px solid rgba(239,68,68,.15)}

/* ── Improvements ── */
.improve-item{font-size:11px;color:var(--fg2);padding:4px 0;display:flex;align-items:center;gap:6px}
.improve-item::before{content:'→';color:var(--fg4);font-size:10px}

/* ── Mobile ── */
@media(max-width:1024px){
  .sb{display:none}
  .main{padding:0 16px 40px}
  .stats{grid-template-columns:repeat(3,1fr)}
  .grid3,.grid2,.grid4{grid-template-columns:1fr 1fr}
  .trade-grid{grid-template-columns:1fr}
}
@media(max-width:680px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .grid3,.grid2,.grid4{grid-template-columns:1fr}
  .topbar-left h1{font-size:16px}
}
</style>
<!-- DATA_INJECTION_POINT -->
</head>
<body>

<!-- ══ SIDEBAR ══ -->
<aside class="sb">
  <div class="sb-brand">
    <div class="sb-brand-icon">P</div>
    <div>
      <div class="sb-brand-text">PrimeHermes</div>
      <div class="sb-brand-sub">Command Center</div>
    </div>
  </div>
  <nav class="sb-nav">
    <div class="sb-section">Overview</div>
    <a class="sb-item active" href="#" onclick="scrollTo('dashboard')"><span class="sb-item-icon">📊</span> Dashboard</a>
    <a class="sb-item" href="#" onclick="scrollTo('sites')"><span class="sb-item-icon">🌐</span> Sites</a>
    <a class="sb-item" href="#" onclick="scrollTo('trading')"><span class="sb-item-icon">📈</span> Trading</a>
    <div class="sb-section">Operations</div>
    <a class="sb-item" href="#" onclick="scrollTo('agents')"><span class="sb-item-icon">🤖</span> Agents</a>
    <a class="sb-item" href="#" onclick="scrollTo('leads')"><span class="sb-item-icon">🎯</span> Leads</a>
    <a class="sb-item" href="#" onclick="scrollTo('changelog')"><span class="sb-item-icon">📋</span> Changelog</a>
  </nav>
  <div class="sb-footer">v4.0 · Hermes OS</div>
</aside>

<!-- ══ MAIN ══ -->
<div class="main" id="dashboard">

  <!-- Top Bar -->
  <div class="topbar">
    <div>
      <h1>PrimeHermes</h1>
      <p>AI Operating System for Your Businesses</p>
    </div>
    <div class="topbar-right">
      <div class="topbar-update"><span class="status-dot green"></span> All systems nominal</div>
      <div class="topbar-update" id="updateTime">Updated: —</div>
    </div>
  </div>

  <!-- Stats Row -->
  <div class="stats" id="statsRow"></div>

  <!-- === SITES === -->
  <div class="section-title" id="sites">🌐 Sites & Health</div>
  <div class="grid3" id="sitesGrid"></div>

  <!-- === TRADING === -->
  <div class="section-title" id="trading">📈 Trading Signals</div>
  <div id="tradingSection">
    <div class="trade-grid" id="tradeGrid"></div>
  </div>

  <!-- === AGENTS === -->
  <div class="section-title" id="agents">🤖 AI Agents</div>
  <div class="grid3" id="agentsGrid"></div>

  <!-- === LEADS + CHANGELOG === -->
  <div class="grid2">
    <div>
      <div class="section-title" id="leads">🎯 Lead Inbox</div>
      <div class="card" id="leadsCard"><div class="lead-list" id="leadsList"></div></div>
    </div>
    <div>
      <div class="section-title" id="changelog">📋 Activity Log</div>
      <div class="card" id="logCard"><div class="log-list" id="logList"></div></div>
    </div>
  </div>

</div>

<script>
// ══ Data (injected by generate.py) ══
</script>
<script>
function scrollTo(el) {
  document.getElementById(el)?.scrollIntoView({behavior:'smooth'});
  return false;
}

function fmtNum(n) { return n.toLocaleString('en-US') }

function fmtDate(iso) {
  if(!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
}

function changeClass(v) {
  if(!v && v!==0) return '';
  if(v>0) return 'up';
  if(v<0) return 'down';
  return '';
}

function changeStr(v) {
  if(!v && v!==0) return '—';
  const sign = v>0?'+':'';
  return sign+(v*100).toFixed(1)+'%';
}

function init() {
  // Update time
  var ut = document.getElementById('updateTime');
  if(SITES_DATA && SITES_DATA.length > 0) {
    var updated = SITES_DATA[0]?.last_checked || '—';
    ut.innerHTML = '🕐 Last: '+fmtDate(updated);
  }

  // ══ STATS ══
  var statsRow = document.getElementById('statsRow');
  var totalSites = SITES_DATA?.length||0;
  var onlineCount = (SITES_DATA||[]).filter(s=>s.status==='online').length;
  var totalLeads = LEADS?.length||0;
  var contactedLeads = (LEADS||[]).filter(l=>l.contacted).length;
  var totalLogs = LOG_DATA?.length||0;
  
  var tradingCount = 0;
  try { if(window.TRADING_DATA && TRADING_DATA.signals) tradingCount = TRADING_DATA.signals.length; } catch(e){}

  var stats = [
    {icon:'🌐',val:totalSites,label:'Sites Monitored',change:'',sub:onlineCount+' online'},
    {icon:'🎯',val:totalLeads,label:'Total Leads',change:contactedLeads>0?'+'+contactedLeads:'',sub:contactedLeads+' contacted'},
    {icon:'🤖',val:AGENTS_DATA?.length||0,label:'AI Agents',change:'',sub:'All active'},
    {icon:'📈',val:tradingCount,label:'Trading Signals',change:'',sub:'Live'},
    {icon:'📋',val:totalLogs,label:'Activity Entries',change:'',sub:'Recent'},
    {icon:'✅',val:onlineCount+'/'+totalSites,label:'Sites Online',change:'',sub:'Uptime monitor'},
  ];
  stats.forEach(function(s){
    statsRow.innerHTML += '<div class="stat">'+
      '<div class="stat-icon">'+s.icon+'</div>'+
      '<div class="stat-val">'+s.val+'</div>'+
      '<div class="stat-label">'+s.label+'</div>'+
      '<div class="stat-change '+(s.change>0?'up':'')+'">'+(s.change||s.sub)+'</div>'+
    '</div>';
  });

  // ══ SITES ══
  var sitesGrid = document.getElementById('sitesGrid');
  (SITES_DATA||[]).forEach(function(s){
    var seoScore = '';
    if(s.score !== undefined && s.score !== null) {
      var cls = s.score>=80?'score-good':s.score>=50?'score-medium':'score-bad';
      seoScore = '<span class="score-badge '+cls+'">'+s.score+'/100</span>';
    }
    sitesGrid.innerHTML += '<div class="card site-card">'+
      '<div class="top">'+
        '<span class="site-dot '+(s.status==='online'?'online':'offline')+'"></span>'+
        '<div class="site-name">'+s.name+'</div>'+
        seoScore+
      '</div>'+
      '<div class="site-url">'+(s.url?s.url:'—')+'</div>'+
      '<div class="site-stats">'+
        '<span>⏱️ <strong>'+s.uptime+'</strong></span>'+
        (s.seo?.pages_analyzed?'<span>📄 <strong>'+s.seo.pages_analyzed+'</strong> pages</span>':'')+
      '</div>'+
    '</div>';
  });

  // ══ TRADING ══
  var tradeGrid = document.getElementById('tradeGrid');
  try {
    if(window.TRADING_DATA && TRADING_DATA.signals) {
      TRADING_DATA.signals.forEach(function(sig){
        var cls = sig.action==='BUY'?'pos':sig.action==='SELL'?'neg':'';
        var sigCls = sig.action==='BUY'?'buy':sig.action==='SELL'?'sell':'hold';
        var sigLabel = sig.action==='BUY'?'🟢 BUY':sig.action==='SELL'?'🔴 SELL':'🟡 HOLD';
        tradeGrid.innerHTML += '<div class="trade-asset">'+
          '<div class="trade-symbol">'+sig.pair+'/USD</div>'+
          '<div class="trade-price">$'+fmtNum(sig.price)+'</div>'+
          '<div class="trade-change '+(sig.indicators?.price_change_pct>0?'pos':'neg')+'">'+
            changeStr(sig.indicators?.price_change_pct)+
          '</div>'+
          '<div class="trade-signal '+sigCls+'">'+sigLabel+'</div>'+
        '</div>';
      });
    } else {
      tradeGrid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:32px;color:var(--fg3);font-size:13px">📊 No trading data available yet</div>';
    }
  } catch(e) {
    tradeGrid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:32px;color:var(--fg3);font-size:13px">📊 Trading data loading...</div>';
  }

  // ══ AGENTS ══
  var agentsGrid = document.getElementById('agentsGrid');
  (AGENTS_DATA||[]).forEach(function(a){
    agentsGrid.innerHTML += '<div class="card agent-card">'+
      '<div class="agent-icon">'+a.icon+'</div>'+
      '<div class="agent-info">'+
        '<div class="agent-name">'+a.name+'</div>'+
        '<div class="agent-meta">'+a.jobs+' jobs · Last: '+a.last+'</div>'+
      '</div>'+
      '<div class="agent-status active">Active</div>'+
    '</div>';
  });

  // ══ LEADS ══
  var leadsList = document.getElementById('leadsList');
  if(LEADS && LEADS.length>0) {
    (LEADS||[]).slice(0,15).forEach(function(l){
      leadsList.innerHTML += '<div class="lead-item">'+
        '<span class="lead-status '+(l.contacted?'contacted':'new')+'">'+(l.contacted?'✅':'🆕')+'</span>'+
        '<span class="lead-email">'+l.email+'</span>'+
        '<span class="lead-date">'+fmtDate(l.date)+'</span>'+
      '</div>';
    });
  } else {
    leadsList.innerHTML = '<div style="padding:20px;text-align:center;color:var(--fg3);font-size:12px">No leads yet</div>';
  }

  // ══ LOG ══
  var logList = document.getElementById('logList');
  (LOG_DATA||[]).slice(0,20).forEach(function(l){
    logList.innerHTML += '<div class="log-item">'+
      '<span class="log-date">'+fmtDate(l.date)+'</span>'+
      '<span class="log-msg">'+(l.message||l.text||'')+'</span>'+
    '</div>';
  });
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
