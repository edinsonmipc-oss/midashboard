  });}
  var tradeGrid=document.getElementById('tradeGrid');
  try{if(window.TRADING_DATA&&TRADING_DATA.signals){TRADING_DATA.signals.forEach(function(sig){var sigCls=sig.action==='BUY'?'buy':sig.action==='SELL'?'sell':'hold';var sigLabel=sig.action==='BUY'?'🟢BUY':sig.action==='SELL'?'🔴SELL':'🟡HOLD';tradeGrid.innerHTML+='<div class="trade-asset">'+'<div class="trade-symbol">'+sig.pair+'/USD</div>'+'<div class="trade-price">$'+fmtNum(sig.price)+'</div>'+'<div class="trade-change '+(sig.indicators&&sig.indicators.price_change_pct>0?'pos':'neg')+'">'+changeStr(sig.indicators&&sig.indicators.price_change_pct)+'</div>'+'<div class="trade-signal '+sigCls+'">'+sigLabel+'</div>'+'</div>';});}else{tradeGrid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:32px;color:var(--fg3);font-size:13px">📊No trading data available yet</div>';}}catch(e){tradeGrid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:32px;color:var(--fg3);font-size:13px">📊Trading data loading...</div>';}
  var bizGrid=document.getElementById('bizGrid');
  if(typeof BIZ_DATA!=='undefined'){BIZ_DATA.forEach(function(b){var mHtml='';if(b.metrics){Object.keys(b.metrics).forEach(function(k){mHtml+='<div class="biz-metric"><strong>'+k.replace(/_/g,' ').toUpperCase()+':</strong> '+b.metrics[k]+'</div>';});}
    bizGrid.innerHTML+='<div class="biz-card">'+'<div class="biz-header">'+'<span class="biz-emoji">'+(b.emoji||'📌')+'</span>'+'<span class="biz-name">'+b.name+'</span>'+'<span class="biz-status">'+b.status+'</span>'+'</div>'+'<div class="biz-desc">'+(b.description||'')+'</div>'+'<div class="biz-metrics">'+mHtml+'</div>'+(b.url?'<div class="biz-links"><a class="biz-link" href="'+b.url+'" target="_blank">🔗Open</a></div>':'')+(b.next_steps&&b.next_steps.length?'<div class="biz-next"><strong>→Next:</strong>'+b.next_steps.slice(0,3).join('·')+'</div>':'')+(b.notes?'<div class="biz-notes">'+b.notes+'</div>':'')+'</div>';
  });}
  var agentsGrid=document.getElementById('agentsGrid');
  if(typeof AGENTS_DATA!=='undefined'){AGENTS_DATA.forEach(function(a){agentsGrid.innerHTML+='<div class="card agent-card">'+'<div class="agent-icon">'+a.icon+'</div>'+'<div class="agent-info">'+'<div class="agent-name">'+a.name+'</div>'+'<div class="agent-meta">'+a.jobs+' jobs·Last: '+a.last+'</div>'+'</div>'+'<div class="agent-status active">Active</div>'+'</div>';});}
  var leadsList=document.getElementById('leadsList');
  if(typeof LEADS!=='undefined'&&LEADS.length>0){LEADS.slice(0,15).forEach(function(l){leadsList.innerHTML+='<tr>'+'<td><span class="lead-status '+(l.contacted?'contacted':'new')+'">'+(l.contacted?'✅':'🆕')+'</span></td>'+'<td class="lead-email">'+l.email+'</td>'+'<td class="lead-date">'+fmtDate(l.date)+'</td>'+'</tr>';});}else{leadsList.innerHTML='<tr><td colspan="3" style="padding:20px;text-align:center;color:var(--fg3);font-size:12px">No leads yet</td></tr>';}
  var logList=document.getElementById('logList');
  if(typeof LOG_DATA!=='undefined'){LOG_DATA.slice(0,20).forEach(function(l){logList.innerHTML+='<div class="log-item">'+'<span class="log-date">'+fmtDate(l.date)+'</span>'+'<span class="log-msg">'+(l.message||l.text||l.description||'')+'</span>'+'</div>';});}
}
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
