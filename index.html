<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Hermes OS — AI Operating System for Tradies</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
<style>
/* ── Reset & Vars ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0b12;--bg2:#0f0f18;--card:#13131e;--card-hov:#181825;
  --border:#1e1e30;--border-hov:#2a2a40;--fg:#f1f1f5;--fg2:#a1a1b5;--fg3:#6b6b80;
  --accent:#3b82f6;--accent-glow:#3b82f640;--accent2:#6366f1;
  --green:#22c55e;--yellow:#f59e0b;--red:#ef4444;--orange:#f97316;
  --rad:12px;--rad-sm:8px;--rad-lg:16px;
  --shadow:0 1px 3px rgba(0,0,0,.3),0 1px 2px rgba(0,0,0,.2);
  --shadow-lg:0 4px 16px rgba(0,0,0,.4);
  --ts:.2s cubic-bezier(.4,0,.2,1);
  --sidebar-w:220px;--top-h:56px;
}
html{scroll-behavior:smooth}
body{font-family:'Inter',-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--fg);min-height:100vh;display:flex;overflow:hidden;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
::selection{background:var(--accent);color:#fff}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}
::-webkit-scrollbar-thumb:hover{background:var(--border-hov)}

/* ── Sidebar ── */
.sb{width:var(--sidebar-w);min-width:var(--sidebar-w);height:100vh;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;left:0;top:0;z-index:100;overflow-y:auto;overflow-x:hidden}
.sb-h{padding:16px 16px 12px;border-bottom:1px solid var(--border);margin-bottom:4px}
.sb-logo{font-size:16px;font-weight:700;letter-spacing:-.3px;display:flex;align-items:center;gap:8px}
.sb-logo span{background:linear-gradient(135deg,var(--fg),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sb-logo small{font-size:9px;font-weight:500;color:var(--fg3);-webkit-text-fill-color:var(--fg3);letter-spacing:1.5px;text-transform:uppercase;margin-left:4px}
.sb-sec{padding:4px 0}
.sb-label{font-size:10px;font-weight:600;color:var(--fg3);text-transform:uppercase;letter-spacing:1.2px;padding:8px 16px 4px}
.sb-btn{display:flex;align-items:center;gap:10px;padding:9px 16px;margin:1px 8px;border-radius:var(--rad-sm);font-size:13px;font-weight:500;color:var(--fg2);cursor:pointer;transition:all var(--ts);border:none;background:none;width:calc(100% - 16px);text-align:left;font-family:inherit}
.sb-btn:hover{background:var(--card);color:var(--fg)}
.sb-btn.on{background:var(--accent);color:#fff;box-shadow:0 0 20px var(--accent-glow)}
.sb-btn .sbc{font-size:10px;font-weight:600;background:var(--card);padding:1px 7px;border-radius:10px;color:var(--fg2);margin-left:auto}
.sb-btn.on .sbc{background:rgba(255,255,255,.2);color:#fff}
.sb-sp{flex:1}
.sb-ft{padding:12px 16px;border-top:1px solid var(--border);font-size:11px;color:var(--fg3);display:flex;align-items:center;gap:8px}
.sb-ft .av{width:28px;height:28px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#fff;flex-shrink:0}
.sb-ft .un{font-weight:500;color:var(--fg2);font-size:12px}
.sb-ft .ud{font-size:10px;color:var(--fg3)}

/* ── Main Layout ── */
.mn{margin-left:var(--sidebar-w);flex:1;height:100vh;overflow-y:auto;overflow-x:hidden}
.top{height:var(--top-h);display:flex;align-items:center;justify-content:space-between;padding:0 24px;border-bottom:1px solid var(--border);background:var(--bg2);position:sticky;top:0;z-index:50;gap:12px;flex-wrap:wrap}
.top-l{display:flex;align-items:center;gap:10px}
.top-l h1{font-size:16px;font-weight:600}
.top-l span{font-size:12px;color:var(--fg3)}
.top-r{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.qa-btn{display:flex;align-items:center;gap:6px;padding:7px 14px;background:var(--card);border:1px solid var(--border);border-radius:var(--rad-sm);font-size:12px;font-weight:500;color:var(--fg2);cursor:pointer;transition:all var(--ts);font-family:inherit}
.qa-btn:hover{background:var(--card-hov);border-color:var(--border-hov);color:var(--fg)}
.qa-btn-p{background:var(--accent);border-color:var(--accent);color:#fff}
.qa-btn-p:hover{background:#2563eb;border-color:#2563eb;color:#fff;box-shadow:0 0 20px var(--accent-glow)}
.qa-btn svg{width:14px;height:14px;flex-shrink:0}

/* ── Content ── */
.c{max-width:1200px;margin:0 auto;padding:20px 24px 40px}

/* ── Panel switching ── */
.pn{display:none;animation:fadeIn .3s ease}
.pn.on{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── Section Headers ── */
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:10px;flex-wrap:wrap}
.sh h2{font-size:18px;font-weight:600;letter-spacing:-.3px}
.sh .shl{font-size:12px;color:var(--fg3)}
.sh .shl b{color:var(--fg)}

/* ── Metric Grid ── */
.mg{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:24px}
.mc{background:var(--card);border:1px solid var(--border);border-radius:var(--rad-lg);padding:16px 18px;transition:all var(--ts);cursor:default;position:relative;overflow:hidden}
.mc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:0;transition:opacity var(--ts)}
.mc:hover{background:var(--card-hov);border-color:var(--border-hov);transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.mc:hover::before{opacity:1}
.mc-l{font-size:12px;color:var(--fg3);margin-bottom:2px;font-weight:500}
.mc-v{font-size:26px;font-weight:700;letter-spacing:-.5px;margin-bottom:1px}
.mc-s{font-size:11px;color:var(--fg3);display:flex;align-items:center;gap:4px}
.mc-trend{font-size:11px;font-weight:600;padding:1px 6px;border-radius:6px}
.mc-trend.up{color:var(--green);background:rgba(34,197,94,.12)}
.mc-trend.down{color:var(--red);background:rgba(239,68,68,.12)}
.mc .mc-icon{position:absolute;right:14px;top:14px;font-size:22px;opacity:.15}

/* ── Card grid ── */
.cg{display:grid;gap:12px;margin-bottom:24px}
.cg-2{grid-template-columns:1fr 1fr}
.cg-3{grid-template-columns:1fr 1fr 1fr}
@media(max-width:900px){.cg-2,.cg-3{grid-template-columns:1fr}}

/* ── Section Cards ── */
.sc{background:var(--card);border:1px solid var(--border);border-radius:var(--rad-lg);overflow:hidden;transition:all var(--ts)}
.sc:hover{border-color:var(--border-hov)}
.sc-h{display:flex;align-items:center;gap:10px;padding:16px 18px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.sc-h h3{font-size:14px;font-weight:600;flex:1}
.sc-h .sc-count{font-size:11px;font-weight:600;background:var(--bg);padding:1px 8px;border-radius:8px;color:var(--fg2)}
.sc-b{padding:18px}

/* ── Lead Cards (CRM style) ── */
.lg{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.lc{background:var(--bg);border:1px solid var(--border);border-radius:var(--rad);padding:14px;transition:all var(--ts);cursor:default}
.lc:hover{background:var(--card);border-color:var(--border-hov);transform:translateY(-1px)}
.lch{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px;gap:6px}
.lcn{font-weight:600;font-size:13px}
.lce{font-size:11px;color:var(--fg3);word-break:break-all}
.lcd{font-size:11px;color:var(--fg3);margin:3px 0 8px;line-height:1.4}
.lcf{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.lb{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:600;padding:2px 8px;border-radius:6px;text-transform:uppercase;letter-spacing:.3px}
.lb-v{background:rgba(34,197,94,.12);color:var(--green)}
.lb-r{background:rgba(245,158,11,.12);color:var(--yellow)}
.lb-i{background:rgba(239,68,68,.12);color:var(--red)}
.lb-biz{font-size:9px;padding:1px 6px;border-radius:4px;color:#fff}
.lb-antonio{background:#dc2626}
.lb-prime{background:#2563eb}
.lc-action{display:flex;gap:4px;margin-left:auto}
.lc-action button{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:3px 8px;font-size:10px;color:var(--fg2);cursor:pointer;transition:all var(--ts);font-family:inherit}
.lc-action button:hover{background:var(--card-hov);border-color:var(--accent);color:var(--fg)}
.lc-action .send-btn:hover{background:var(--accent);border-color:var(--accent);color:#fff}
.lc-action .done-btn{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.2);color:var(--green)}

/* ── Site Health Cards ── */
.shg{display:grid;gap:10px}
.shc{background:var(--bg);border:1px solid var(--border);border-radius:var(--rad);padding:14px 16px;display:flex;align-items:center;gap:14px;transition:all var(--ts)}
.shc:hover{background:var(--card);border-color:var(--border-hov)}
.shc-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.shc-info{flex:1;min-width:0}
.shc-name{font-weight:600;font-size:13px;margin-bottom:1px}
.shc-url{font-size:11px;color:var(--fg3)}
.shc-meta{font-size:10px;color:var(--fg3);display:flex;gap:12px;margin-top:2px}
.shc-status{font-size:10px;font-weight:600;padding:2px 10px;border-radius:10px;text-transform:uppercase;letter-spacing:.5px;flex-shrink:0}
.shc-status.on{background:rgba(34,197,94,.12);color:var(--green)}
.shc-status.off{background:rgba(239,68,68,.12);color:var(--red)}

/* ── Agent cards ── */
.ag{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.ac{background:var(--bg);border:1px solid var(--border);border-radius:var(--rad);padding:14px;transition:all var(--ts)}
.ac:hover{background:var(--card);border-color:var(--border-hov)}
.ach{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.ac-icon{width:32px;height:32px;border-radius:8px;background:var(--card);display:flex;align-items:center;justify-content:center;font-size:14px}
.ac h4{font-size:13px;font-weight:600;flex:1}
.ac-st{font-size:10px;font-weight:600;padding:1px 8px;border-radius:6px}
.ac-st.active{background:rgba(34,197,94,.12);color:var(--green)}
.ac-st.paused{background:rgba(245,158,11,.12);color:var(--yellow)}
.ac-stats{display:grid;grid-template-columns:1fr 1fr;gap:4px;font-size:11px;color:var(--fg3)}
.ac-stats span{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--border)}
.ac-stats span:last-child{border:none}
.ac-stats b{color:var(--fg2);font-weight:500}

/* ── Business cards ── */
.bg2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:800px){.bg2{grid-template-columns:1fr}}
.bc2{background:var(--bg);border:1px solid var(--border);border-radius:var(--rad-lg);padding:18px;transition:all var(--ts);border-left:3px solid var(--bcz)}
.bc2:hover{background:var(--card);border-color:var(--border-hov);transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.bc2-h{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.bc2-h .emoji{font-size:20px}
.bc2-h h3{font-size:15px;font-weight:600}
.bc2-h .st-badge{font-size:10px;font-weight:600;padding:1px 8px;border-radius:6px;margin-left:auto}
.bc2-d{font-size:12px;color:var(--fg3);margin-bottom:8px;line-height:1.4}
.bc2-m{display:grid;grid-template-columns:repeat(auto-fit,minmax(60px,1fr));gap:6px;margin-bottom:8px}
.bc2-mitem{text-align:center;background:var(--card);border-radius:6px;padding:5px}
.bc2-ml{font-size:9px;color:var(--fg3);text-transform:uppercase;letter-spacing:.3px}
.bc2-mv{font-size:12px;font-weight:600;color:var(--accent);margin-top:1px}
.bc2-url{font-size:11px;color:var(--accent);text-decoration:none;display:inline-block;margin-bottom:6px}
.bc2-url:hover{text-decoration:underline}
.bc2-notes{font-size:11px;color:var(--fg3);background:var(--card);border-radius:6px;padding:6px 8px;margin-top:6px}
.bc2-steps{list-style:none;font-size:11px}
.bc2-steps li{padding:2px 0;color:var(--fg3);display:flex;align-items:center;gap:4px}
.bc2-steps li.d{color:var(--fg)}

/* ── Changelog timeline ── */
.tl{position:relative;padding-left:24px}
.tl::before{content:'';position:absolute;left:6px;top:4px;bottom:4px;width:1px;background:var(--border)}
.tle{position:relative;padding:4px 0 8px;font-size:12px}
.tle::before{content:'';position:absolute;left:-20px;top:8px;width:8px;height:8px;border-radius:50%;background:var(--accent);border:2px solid var(--bg)}
.tle-date{font-size:10px;color:var(--fg3);margin-bottom:1px}
.tle-text{color:var(--fg2);line-height:1.4}
.tle-project{font-size:10px;font-weight:600;color:var(--accent2)}

/* ── Tasks Kanban ── */
.tk{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media(max-width:800px){.tk{grid-template-columns:repeat(2,1fr)}}
.tcol{background:var(--bg);border:1px solid var(--border);border-radius:var(--rad);padding:12px;min-height:150px}
.tcol h4{font-size:11px;color:var(--fg3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;font-weight:600}
.ti{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:6px 9px;margin-bottom:4px;font-size:11px;cursor:pointer;transition:all var(--ts);color:var(--fg2)}
.ti:hover{border-color:var(--border-hov);background:var(--card-hov)}
.addt{background:none;border:1px dashed var(--border);border-radius:6px;padding:5px;font-size:11px;color:var(--fg3);cursor:pointer;width:100%;font-family:inherit;text-align:center;transition:all var(--ts)}
.addt:hover{border-color:var(--accent);color:var(--accent)}

/* ── Notes ── */
.notes-box textarea{width:100%;min-height:160px;background:var(--bg);border:1px solid var(--border);border-radius:var(--rad);color:var(--fg);padding:14px;font-size:13px;font-family:inherit;resize:vertical;transition:border var(--ts)}
.notes-box textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.notes-box .btn-wrap{display:flex;gap:8px;align-items:center;margin-top:8px}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;background:var(--card);border:1px solid var(--border);border-radius:var(--rad-sm);font-size:12px;font-weight:500;color:var(--fg2);cursor:pointer;transition:all var(--ts);font-family:inherit}
.btn:hover{background:var(--card-hov);border-color:var(--border-hov);color:var(--fg)}
.btn-p{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-p:hover{background:#2563eb;box-shadow:0 0 20px var(--accent-glow)}
.btn-g{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.2);color:var(--green)}
.btn-g:hover{background:rgba(34,197,94,.2)}

/* ── Toast ── */
#to{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--card);border:1px solid var(--border);backdrop-filter:blur(12px);padding:10px 20px;border-radius:var(--rad);font-size:13px;color:var(--fg);opacity:0;transition:all .35s cubic-bezier(.4,0,.2,1);pointer-events:none;z-index:999;box-shadow:var(--shadow-lg)}
#to.sh{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Template Overlay ── */
#tmo{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:1000;display:none;align-items:center;justify-content:center}
#tmo.sh{display:flex}
#tmp{background:var(--card);border:1px solid var(--border);border-radius:var(--rad-lg);max-width:520px;width:92%;max-height:80vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:fadeIn .2s ease}
#tmh{display:flex;align-items:center;padding:16px 18px;border-bottom:1px solid var(--border);gap:8px;position:sticky;top:0;background:var(--card)}
#tmh h3{font-size:14px;font-weight:600;flex:1}
#tmx{background:none;border:none;color:var(--fg3);font-size:18px;cursor:pointer;padding:0 4px;font-family:inherit;transition:color var(--ts)}
#tmx:hover{color:var(--fg)}
#tmb{padding:16px 18px;font-size:12px;color:var(--fg2);line-height:1.6;white-space:pre-wrap;font-family:inherit}
#tmf{padding:12px 18px 16px;display:flex;gap:8px;flex-wrap:wrap;border-top:1px solid var(--border)}

/* ── Mobile ── */
@media(max-width:768px){
  :root{--sidebar-w:0px}
  .sb{width:0;min-width:0;overflow:hidden;border:none}
  .sb.open{width:220px;min-width:220px;box-shadow:var(--shadow-lg);z-index:200}
  .mn{margin-left:0}
  .top{padding:10px 14px}
  .top-l h1{font-size:14px}
  .c{padding:12px 14px 30px}
  .mg{grid-template-columns:repeat(2,1fr);gap:8px}
  .mc{padding:12px 14px}
  .mc-v{font-size:20px}
  .lg{grid-template-columns:1fr}
  .bg2{grid-template-columns:1fr}
  .tk{grid-template-columns:1fr 1fr}
  .qa-btn{font-size:11px;padding:5px 10px}
  .sb-h .hamburger{display:block}
}

/* ── Hamburger (mobile) ── */
.hamburger{display:none;background:none;border:none;color:var(--fg);font-size:22px;cursor:pointer;padding:2px;line-height:1}
.hamburger:focus{outline:none}
@media(max-width:768px){.hamburger{display:block}}
.sb-overlay{display:none}
@media(max-width:768px){
  .sb.open + .sb-overlay{display:block;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:150}
}

/* ── Misc ── */
.block{margin-bottom:24px}
.flex{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.gap-1{gap:4px}
.text-muted{color:var(--fg3);font-size:12px}
.text-accent{color:var(--accent)}
.w-full{width:100%}
</style>
