<title>Hermes OS — Command Center</title>

<style>
/* ═══════════════════════════════════════════
   HERMES OS v2 — Premium SaaS Dashboard
   Inspired by: Linear, Vercel, Stripe, Raycast
   ═══════════════════════════════════════════ */

/* ─── RESET & VARIABLES ─── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050505;
  --bg2:#0a0a0a;
  --surface:#111111;
  --surface-hover:#1a1a1a;
  --surface-active:#222222;
  --border:rgba(255,255,255,.08);
  --border-light:rgba(255,255,255,.05);
  --border-active:#6c5ce7;
  --fg:#ffffff;
  --fg2:#a0a0a0;
  --fg3:#707070;
  --fg4:#505050;
  --fg5:#353535;
  --accent:#6c5ce7;
  --accent-hover:#7c6cf7;
  --accent-soft:rgba(108,92,231,.10);
  --accent-glow:rgba(108,92,231,.06);
  --accent-glow-heavy:rgba(108,92,231,.20);
  --green:#22c55e;
  --green-soft:rgba(34,197,94,.08);
  --green-glow:rgba(34,197,94,.18);
  --yellow:#f59e0b;
  --yellow-soft:rgba(245,158,11,.08);
  --red:#ef4444;
  --red-soft:rgba(239,68,68,.08);
  --blue:#3b82f6;
  --blue-soft:rgba(59,130,246,.08);
  --radius:10px;
  --radius-sm:6px;
  --radius-xs:4px;
  --shadow-sm:0 1px 2px rgba(0,0,0,.4);
  --shadow:0 4px 16px rgba(0,0,0,.5);
  --shadow-lg:0 8px 32px rgba(0,0,0,.6);
  --shadow-glow:0 0 20px var(--accent-glow);
  --sidebar-w:240px;
  --sidebar-w-collapsed:0px;
  --header-h:52px;
  --transition:.2s ease;
  --transition-fast:.12s ease;
  --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen-Sans,Ubuntu,Cantarell,'Helvetica Neue',sans-serif;
  --mono:'JetBrains Mono',monospace;
}
html{height:100%;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body{min-height:100vh;background:var(--bg);color:var(--fg);font-family:var(--font);font-size:14px;line-height:1.5;overflow:hidden;display:flex;text-rendering:optimizeLegibility;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;font-optical-sizing:auto}
a{color:inherit;text-decoration:none}
button{cursor:pointer;font-family:inherit}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--fg5);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--fg4)}
::-webkit-scrollbar-track{background:transparent}
::selection{background:var(--accent);color:#fff}

/* ─── SIDEBAR ─── */
.sidebar{
  width:var(--sidebar-w);height:100vh;position:fixed;left:0;top:0;
  background:var(--bg2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;z-index:100;
  transition:transform var(--transition),width var(--transition);
}
.sidebar-header{
  display:flex;align-items:center;gap:12px;
  padding:16px 18px 14px;border-bottom:1px solid var(--border-light);
  min-height:var(--header-h);
}
.sidebar-logo{
  width:32px;height:32px;border-radius:var(--radius-sm);
  background:linear-gradient(135deg,var(--accent),#a29bfe);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:800;color:#fff;flex-shrink:0;
  box-shadow:0 0 24px var(--accent-glow-heavy);
  position:relative;
}
.sidebar-logo::after{
  content:'';position:absolute;inset:-2px;
  border-radius:10px;
  background:linear-gradient(135deg,var(--accent),transparent);
  opacity:.3;z-index:-1;
}
.sidebar-brand{line-height:1.2}
.sidebar-brand-name{font-size:14px;font-weight:700;letter-spacing:-.3px}
.sidebar-brand-sub{font-size:8px;font-weight:600;color:var(--fg4);letter-spacing:2px;text-transform:uppercase}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 8px;display:flex;flex-direction:column;gap:1px}
.sidebar-group{padding:14px 12px 5px;font-size:8px;font-weight:700;color:var(--fg5);letter-spacing:1.8px;text-transform:uppercase}
.sidebar-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 14px;border-radius:var(--radius-sm);
  font-size:13px;font-weight:500;color:var(--fg3);
  transition:all var(--transition-fast);cursor:pointer;
  border:none;background:none;width:100%;text-align:left;
  position:relative;
}
.sidebar-item:hover{background:var(--surface);color:var(--fg);}
.sidebar-item:active{transform:scale(.98)}
.sidebar-item.active{
  background:var(--accent-soft);color:var(--accent);font-weight:600;
}
.sidebar-item.active::before{
  content:'';position:absolute;left:-8px;top:50%;transform:translateY(-50%);
  width:3px;height:16px;border-radius:0 2px 2px 0;
  background:var(--accent);
  box-shadow:0 0 12px var(--accent-glow-heavy);
}
.sidebar-item-icon{width:20px;text-align:center;font-size:14px;flex-shrink:0}
.sidebar-badge{
  margin-left:auto;font-size:8px;font-weight:700;
  padding:2px 7px;border-radius:4px;
  background:var(--border-light);color:var(--fg4);
}
.sidebar-footer{
  padding:12px 16px;border-top:1px solid var(--border-light);
  font-size:8px;color:var(--fg5);text-align:center;
}

/* ─── MAIN CONTENT ─── */
.main{
  flex:1;margin-left:var(--sidebar-w);height:100vh;
  display:flex;flex-direction:column;overflow:hidden;
  transition:margin var(--transition);
}

/* ─── TOPBAR ─── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;min-height:var(--header-h);
  border-bottom:1px solid var(--border-light);
  background:var(--bg);flex-shrink:0;
  position:sticky;top:0;z-index:10;
}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar-title{font-size:16px;font-weight:700;letter-spacing:-.3px}
.topbar-sub{font-size:10px;color:var(--fg4);margin-top:1px}
.topbar-right{display:flex;align-items:center;gap:12px}
.status-pill{
  display:flex;align-items:center;gap:6px;
  font-size:10px;font-weight:600;
  padding:4px 14px;border-radius:20px;
  background:var(--green-soft);color:var(--green);
  border:1px solid rgba(34,197,94,.15);
}
.status-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--green);
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}

/* ─── HAMBURGER ─── */
.hamburger{
  display:none;width:34px;height:34px;align-items:center;justify-content:center;
  background:var(--surface);border:1px solid var(--border-light);
  border-radius:var(--radius-xs);color:var(--fg2);font-size:16px;
  transition:all var(--transition-fast);
}
.hamburger:hover{background:var(--surface-hover);color:var(--fg);border-color:var(--border)}

/* ─── CONTENT AREA ─── */
.content{
  flex:1;overflow-y:auto;padding:20px 28px 40px;max-width:1440px;width:100%;margin:0 auto;
}

/* ─── TABS ─── */
.tab{display:none}
.tab.active{display:block;animation:tabIn .35s ease}
@keyframes tabIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ─── SECTION HEADERS ─── */
.section-title{
  display:flex;align-items:center;gap:8px;
  font-size:10px;font-weight:700;color:var(--fg4);
  letter-spacing:1.2px;text-transform:uppercase;
  margin:24px 0 12px;
}
.section-title::after{
  content:'';flex:1;height:1px;
  background:linear-gradient(to right,var(--border-light),transparent);
}

/* ─── STAT CARDS ─── */
.stats-grid{
  display:grid;grid-template-columns:repeat(5,1fr);gap:10px;
  margin:0 0 24px;
}
.stat-card{
  background:var(--surface);border:1px solid var(--border-light);
  border-radius:var(--radius);padding:16px 18px;
  transition:all var(--transition-fast);
  position:relative;overflow:hidden;
}
.stat-card:hover{
  border-color:var(--border);background:var(--surface-hover);
  transform:translateY(-1px);box-shadow:var(--shadow-sm);
}
.stat-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);
  opacity:0;transition:opacity var(--transition-fast);
}
.stat-card:hover::before{opacity:1}
.stat-icon{font-size:20px;margin-bottom:6px}
.stat-value{
  font-size:26px;font-weight:800;letter-spacing:-.5px;
  background:linear-gradient(135deg,var(--fg),var(--fg2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.stat-label{font-size:10px;color:var(--fg4);margin-top:4px;font-weight:500}
.stat-sub{font-size:9px;color:var(--fg5);margin-top:2px}

/* ─── SITE CARDS ─── */
.sites-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.site-card{
  background:var(--surface);border:1px solid var(--border-light);
  border-radius:var(--radius);padding:16px 18px;
  transition:all var(--transition-fast);
  position:relative;overflow:hidden;
}
.site-card:hover{
  border-color:var(--border);background:var(--surface-hover);
  transform:translateY(-1px);box-shadow:var(--shadow-sm);
}
.site-card::before{
  content:'';position:absolute;top:0;left:0;width:3px;height:100%;
  border-radius:0 2px 2px 0;
  transition:opacity var(--transition-fast);
}
.site-card.online::before{background:var(--green);box-shadow:0 0 12px var(--green-glow);opacity:.6}
.site-card.offline::before{background:var(--red);opacity:.6}
.site-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.site-indicator{
  width:8px;height:8px;border-radius:50%;flex-shrink:0;
  position:relative;
}
.site-indicator.online{background:var(--green);box-shadow:0 0 12px var(--green-glow)}
.site-indicator.offline{background:var(--red);box-shadow:0 0 12px var(--red-soft)}
.site-name{font-size:13px;font-weight:600;flex:1}
.score-badge{
  font-size:9px;font-weight:700;padding:2px 10px;border-radius:20px;
  letter-spacing:.2px;
}
.score-good{background:var(--green-soft);color:var(--green);border:1px solid rgba(34,197,94,.15)}
.score-mid{background:var(--yellow-soft);color:var(--yellow);border:1px solid rgba(245,158,11,.15)}
.score-bad{background:var(--red-soft);color:var(--red);border:1px solid rgba(239,68,68,.15)}
.site-url{
  font-size:10px;color:var(--fg4);margin-bottom:8px;
  font-family:var(--mono);
}
.site-meta{display:flex;gap:16px;font-size:10px;color:var(--fg4)}
.site-meta strong{color:var(--fg2);font-weight:600}

/* ─── PROJECT CARDS ─── */
.biz-list{display:flex;flex-direction:column;gap:8px}
.biz-card{
  background:var(--surface);border:1px solid var(--border-light);
  border-radius:var(--radius);padding:16px 18px;
  transition:all var(--transition-fast);
}
.biz-card:hover{
  border-color:var(--border);background:var(--surface-hover);
  transform:translateY(-1px);box-shadow:var(--shadow-sm);
}
.biz-head{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.biz-emoji{font-size:20px}
.biz-name{font-size:14px;font-weight:600;flex:1}
.biz-status{
  font-size:8px;font-weight:700;padding:3px 10px;border-radius:20px;
  text-transform:uppercase;letter-spacing:.6px;
  background:var(--accent-soft);color:var(--accent);
  border:1px solid rgba(108,92,231,.15);
}
.biz-desc{font-size:11px;color:var(--fg3);margin-bottom:10px;line-height:1.6}
.biz-metrics{display:flex;flex-wrap:wrap;gap:4px 14px;margin-bottom:8px}
.biz-metric{font-size:9px;color:var(--fg5)}
.biz-metric span{color:var(--fg2);font-weight:600}
.biz-actions{display:flex;gap:6px;flex-wrap:wrap}
.biz-action{
  font-size:9px;padding:4px 10px;border-radius:6px;
  background:var(--border-light);color:var(--fg4);
  transition:all var(--transition-fast);
}
.biz-action:hover{background:var(--surface-active);color:var(--fg2)}
.biz-link{
  font-size:10px;color:var(--fg5);margin-left:auto;flex-shrink:0;
  transition:color var(--transition-fast);
}
.biz-link:hover{color:var(--accent)}
.biz-note{
  font-size:9px;color:var(--fg5);margin-top:8px;padding-top:8px;
  border-top:1px solid var(--border-light);font-style:italic;
}

/* ─── AGENT CARDS ─── */
.agents-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.agent-card{
  background:var(--surface);border:1px solid var(--border-light);
  border-radius:var(--radius);padding:16px 12px;
  display:flex;flex-direction:column;align-items:center;text-align:center;gap:4px;
  transition:all var(--transition-fast);
}
.agent-card:hover{
  border-color:var(--border);background:var(--surface-hover);
  transform:translateY(-2px);box-shadow:var(--shadow-sm);
}
.agent-icon{font-size:24px;margin-bottom:4px}
.agent-name{font-size:11px;font-weight:600}
.agent-meta{font-size:9px;color:var(--fg5)}
.agent-badge{
  font-size:8px;font-weight:700;padding:2px 10px;border-radius:20px;
  background:var(--green-soft);color:var(--green);
  margin-top:4px;
}

/* ─── QA ─── */
.qa-card{background:var(--surface);border:1px solid var(--border-light);border-radius:var(--radius);padding:16px 18px}
.qa-summary{font-size:12px;color:var(--fg3);margin-bottom:12px;line-height:1.5}
.qa-row{
  display:flex;align-items:center;gap:10px;
  padding:6px 0;border-bottom:1px solid var(--border-light);
  font-size:11px;
}
.qa-row:last-child{border-bottom:none}

/* ─── LEADS TABLE ─── */
.leads-wrap{
  background:var(--surface);border:1px solid var(--border-light);
  border-radius:var(--radius);overflow:hidden;
}
.leads-table{width:100%;border-collapse:collapse}
.leads-table th{
  padding:8px 14px;text-align:left;font-size:9px;font-weight:700;
  color:var(--fg5);text-transform:uppercase;letter-spacing:1px;
  border-bottom:1px solid var(--border-light);
  background:var(--bg2);
}
.leads-table td{padding:7px 14px;font-size:11px;border-bottom:1px solid var(--border-light)}
.leads-table tr:last-child td{border-bottom:none}
.leads-table tr:hover td{background:var(--surface-hover)}

/* ─── DOCUMENTS ─── */
.docs-grid{display:flex;flex-direction:column;gap:8px}
.doc-card{
  background:var(--surface);border:1px solid var(--border-light);
  border-radius:var(--radius);padding:16px 18px;
  transition:all var(--transition-fast);
}
.doc-card:hover{border-color:var(--border);background:var(--surface-hover);transform:translateY(-1px)}
.doc-head{display:flex;align-items:flex-start;gap:12px;margin-bottom:10px}
.doc-icon{font-size:22px;flex-shrink:0;margin-top:2px}
.doc-info{flex:1}
.doc-name{font-size:13px;font-weight:600;margin-bottom:2px}
.doc-tag{
  display:inline-block;font-size:8px;font-weight:600;padding:2px 8px;border-radius:4px;
  background:var(--border-light);color:var(--fg4);
}
.doc-expiry{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--fg5);flex-shrink:0}
.doc-expiry strong{color:var(--yellow);font-weight:600}
.doc-body{
  font-size:11px;color:var(--fg3);line-height:1.6;
  padding:10px 12px;background:var(--bg2);border-radius:var(--radius-sm);
  margin-bottom:6px;
}
.doc-body strong{color:var(--fg2)}
.doc-meta{font-size:10px;color:var(--fg5);display:flex;gap:14px;flex-wrap:wrap}
.doc-meta strong{color:var(--fg3);font-weight:600}

/* ─── LOG ─── */
.log-wrap{
  background:var(--surface);border:1px solid var(--border-light);
  border-radius:var(--radius);padding:4px 0;
}
.log-item{
  display:flex;gap:12px;padding:8px 16px;
  border-bottom:1px solid var(--border-light);
  font-size:11px;transition:background var(--transition-fast);
}
.log-item:last-child{border-bottom:none}
.log-item:hover{background:var(--surface-hover)}
.log-date{color:var(--fg5);flex-shrink:0;width:72px;font-size:9px;font-family:var(--mono);padding-top:1px}
.log-type{
  font-size:10px;flex-shrink:0;width:60px;
  padding:1px 6px;border-radius:4px;text-align:center;
}
.log-creacion{background:var(--blue-soft);color:var(--blue)}
.log-mejora{background:var(--green-soft);color:var(--green)}
.log-fix{background:var(--yellow-soft);color:var(--yellow)}
.log-analisis{background:var(--accent-soft);color:var(--accent)}
.log-msg{color:var(--fg3);flex:1;line-height:1.5}

/* ─── TRADING ─── */
.trade-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.trade-card{
  background:var(--surface);border:1px solid var(--border-light);
  border-radius:var(--radius);padding:12px 14px;
  transition:all var(--transition-fast);
}
.trade-card:hover{border-color:var(--border);transform:translateY(-1px);box-shadow:var(--shadow-sm)}
.trade-pair{font-size:10px;font-weight:600;color:var(--fg4);text-transform:uppercase;letter-spacing:.5px}
.trade-price{font-size:18px;font-weight:800;margin:4px 0;letter-spacing:-.3px}
.trade-signal{
  display:inline-block;font-size:9px;font-weight:700;
  padding:2px 10px;border-radius:20px;
}
.trade-signal.buy{background:var(--green-soft);color:var(--green)}
.trade-signal.sell{background:var(--red-soft);color:var(--red)}

/* ─── EMPTY STATE ─── */
.empty-state{
  text-align:center;padding:40px 20px;color:var(--fg5);
}
.empty-state-icon{font-size:40px;margin-bottom:12px;opacity:.5}
.empty-state-text{font-size:12px}

/* ─── SKELETON LOADING ─── */
.skeleton{background:linear-gradient(90deg,var(--surface) 25%,var(--surface-hover) 50%,var(--surface) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:var(--radius);min-height:20px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ─── OVERLAY ─── */
.overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.6);z-index:99;
}
.overlay.show{display:block}

/* ─── RESPONSIVE ─── */
@media(max-width:1200px){
  .stats-grid{grid-template-columns:repeat(3,1fr)}
  .agents-grid{grid-template-columns:repeat(3,1fr)}
  .trade-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:900px){
  .hamburger{display:flex}
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
  .overlay{display:block;pointer-events:none;opacity:0;transition:opacity .3s}
  .overlay.show{pointer-events:all;opacity:1;display:block}
  .sites-grid{grid-template-columns:1fr}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .agents-grid{grid-template-columns:repeat(2,1fr)}
  .content{padding:14px 16px 40px}
  .topbar{padding:0 16px}
  .site-meta{flex-wrap:wrap;gap:8px}
  .sidebar-item{font-size:15px;padding:12px 16px}
  .stat-value{font-size:22px}
  .topbar-title{font-size:18px}
}
@media(max-width:600px){
  .stats-grid{grid-template-columns:repeat(2,1fr);gap:8px}
  .stat-card{padding:14px 16px}
  .stat-value{font-size:20px}
  .agents-grid{grid-template-columns:repeat(2,1fr);gap:8px}
  .trade-grid{grid-template-columns:1fr}
  .topbar-sub{display:none}
  .log-item{flex-wrap:wrap;gap:4px}
  .doc-head{flex-direction:column}
  .leads-table{font-size:11px}
  .leads-table th,.leads-table td{padding:8px 10px}
  .biz-head{flex-wrap:wrap}
  .sidebar{width:100%}
  .sidebar-item{font-size:16px;padding:14px 18px}
  .site-card,.stat-card,.biz-card{padding:14px 16px}
  .stat-label{font-size:11px}
  .stat-sub{font-size:10px}
  .site-name{font-size:14px}
}
</style>
</head>
<body>

<!-- ─── OVERLAY ─── -->
<div class="overlay" id="overlay"></div>

<!-- ─── SIDEBAR ─── -->
<aside class="sidebar" id="sidebar">

var TAB_NAMES = {
  overview:'Dashboard', sites:'Sites & Trading', projects:'Projects',
  agents:'AI Agents', qa:'QA Scan', leads:'Leads', docs:'Documents', log:'Activity'
};

function fmtNum(n){
  if(n===undefined||n===null) return '—';
  if(Math.abs(n)>=1e6) return (n/1e6).toFixed(1)+'M';
  if(Math.abs(n)>=1e3) return (n/1e3).toFixed(1)+'k';
  return n.toLocaleString();
}
function fmtDate(d){
  if(!d) return '';
  var p = d.split('T')[0].split('-');
  return p[2]+'/'+p[1]+'/'+p[0].slice(-2);
}
function fmtDateFull(d){
  if(!d) return '';
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var p = d.split('T')[0].split('-');
  return p[2]+' '+months[parseInt(p[1])-1]||p[1];
}

/* ─── TAB SWITCHING ─── */
function initTabs(){
  document.querySelectorAll('.sidebar-item[data-tab]').forEach(function(btn){
    btn.addEventListener('click',function(){
      var tab = this.getAttribute('data-tab');
      document.querySelectorAll('.sidebar-item').forEach(function(b){b.classList.remove('active')});
      this.classList.add('active');
      document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});
      var el = document.getElementById('tab-'+tab);
      if(el) el.classList.add('active');
      var title = document.getElementById('tabTitle');
      if(title && TAB_NAMES[tab]) title.textContent = TAB_NAMES[tab];
      // Close mobile sidebar
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('overlay').classList.remove('show');
    });
  });
}

/* ─── SIDEBAR TOGGLE ─── */
function initSidebar(){
  document.getElementById('hamburger').addEventListener('click',function(){
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('overlay').classList.toggle('show');
  });
  document.getElementById('overlay').addEventListener('click',function(){
    document.getElementById('sidebar').classList.remove('open');
    this.classList.remove('show');
  });
}

        +(acts?'<div class="biz-actions">'+acts+'</div>':'')
        +(b.notes?'<div class="biz-note">'+b.notes+'</div>':'')
        +'</div>';
    });
  }

  // ── AGENTS ──
  var agentsGrid = document.getElementById('agentsGrid');
  if(typeof AGENTS_DATA !== 'undefined'){
    AGENTS_DATA.forEach(function(a){
      agentsGrid.innerHTML += '<div class="agent-card"><div class="agent-icon">'+a.icon+'</div><div class="agent-name">'+a.name+'</div><div class="agent-meta">'+(a.jobs||'0')+' jobs</div><span class="agent-badge">Active</span></div>';
    });
  }

  // ── QA ──
  if(typeof QA_DATA !== 'undefined'){
    var q = QA_DATA;
    var hasIssues = false;
    Object.keys(q.sites||{}).forEach(function(s){if(q.sites[s].status!=='ok')hasIssues=true});
    document.getElementById('qaSummary').innerHTML = (hasIssues ? '⚠️ <strong>Issues Found</strong>' : '✅ <strong>All Clean</strong>') + ' — ' + (q.summary||'');
    var det = '';
    Object.keys(q.sites||{}).forEach(function(s){
      var site = q.sites[s];
      var icon = site.status === 'ok' ? '✅' : '⚠️';
      det += '<div class="qa-row"><span>'+icon+'</span><strong>'+s+'</strong><span style="color:var(--fg4);font-size:10px">'+(site.status==='ok'?'No issues':(site.issues||[]).length+' issues')+'</span></div>';
    });
    document.getElementById('qaDetails').innerHTML = det;
  }

  // ── LEADS ──
  var leadsList = document.getElementById('leadsList');
  if(typeof LEADS !== 'undefined' && LEADS.length > 0){
    LEADS.slice(0,20).forEach(function(l){
      var contacted = l.contacted ? '✅ Sent' : '🆕 Pending';
      leadsList.innerHTML += '<tr><td>'+contacted+'</td><td>'+l.email+'</td><td>'+(l.company||'—')+'</td><td style="font-size:9px;color:var(--fg5);text-transform:capitalize">'+(l.type||'—')+'</td></tr>';
    });
  } else {
    leadsList.innerHTML = '<tr><td colspan="4" class="empty-state">No leads yet</td></tr>';
  }

  // ── DOCUMENTS ──
  var docsGrid = document.getElementById('docsGrid');
  if(typeof DOCS_DATA !== 'undefined' && DOCS_DATA.length > 0){
    DOCS_DATA.forEach(function(d){
      var icon = d.type === 'insurance' ? '🛡️' : '📜';
      var expHtml = '';
      if(d.expiry && d.expiry !== 'N/A (documento de referencia)' && d.expiry !== 'N/A'){
        expHtml = '<div class="doc-expiry">⏳ Vence: <strong>'+d.expiry+'</strong></div>';
      }
      docsGrid.innerHTML += '<div class="doc-card">'
        +'<div class="doc-head">'
        +  '<span class="doc-icon">'+icon+'</span>'
        +  '<div class="doc-info"><div class="doc-name">'+d.name+'</div><span class="doc-tag">'+d.category+'</span></div>'
        +  expHtml
        +'</div>'
        +'<div class="doc-body"><strong>📋 Cubre:</strong> '+(d.covers||'')+'</div>'
        +'<div class="doc-meta">'
        +  (d.policy ? '<span>🔑 Póliza: <strong>'+d.policy+'</strong></span>' : '')
        +  (d.holder ? '<span>👤 '+d.holder+'</span>' : '')
        +'</div></div>';
    });
  } else {
    docsGrid.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📁</div><div class="empty-state-text">No documents uploaded</div></div>';
  }

  // ── ACTIVITY LOG ──
  var logList = document.getElementById('logList');
  if(typeof LOG_DATA !== 'undefined'){
    LOG_DATA.slice(0,15).forEach(function(l){
      var type = l.type || 'other';
      var typeLabel = type.charAt(0).toUpperCase() + type.slice(1);
      var msg = l.message || l.text || l.description || '';
      logList.innerHTML += '<div class="log-item"><span class="log-date">'+fmtDate(l.date)+'</span><span class="log-type log-'+type+'">'+typeLabel+'</span><span class="log-msg">'+msg+'</span></div>';
    });
  } else {
    logList.innerHTML = '<div class="empty-state"><div class="empty-state-text">No activity yet</div></div>';
  }
}

/* ─── INIT ─── */
document.addEventListener('DOMContentLoaded', function(){
  initTabs();
  initSidebar();
  render();
});
</script>
</body>
</html>
